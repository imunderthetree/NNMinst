name: madbase_digit_app
description: NMIST on-device handwritten digit recognizer.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  image: ^4.8.0
  image_picker: ^1.2.2
  tflite_flutter: ^0.12.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/model.tflite
    - assets/logo.png
